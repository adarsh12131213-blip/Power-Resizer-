    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // UI Elements
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            
            const uploadArea = document.getElementById('uploadArea');
            const imageInput = document.getElementById('imageInput');
            
            const galleryContainer = document.getElementById('galleryContainer');
            const galleryGrid = document.getElementById('galleryGrid');
            const galleryCount = document.getElementById('galleryCount');
            
            const editorArea = document.getElementById('editorArea');
            const controlsContainer = document.getElementById('controlsContainer');
            const imageWorkspace = document.getElementById('imageWorkspace');
            const cropperWrapper = document.getElementById('cropperWrapper');
            const staticPreviewWrapper = document.getElementById('staticPreviewWrapper');
            const staticPreviewImg = document.getElementById('staticPreviewImg');
            const editorTools = document.getElementById('editorTools');
            
            // Inputs & Buttons
            const inputWidth = document.getElementById('inputWidth');
            const inputHeight = document.getElementById('inputHeight');
            const applyButtonsContainer = document.getElementById('applyButtonsContainer');
            const btnApplyCrop = document.getElementById('btnApplyCrop');
            const btnApplyAll = document.getElementById('btnApplyAll');
            const applyAllCount = document.getElementById('applyAllCount');
            const btnEditAgain = document.getElementById('btnEditAgain');
            const btnReset = document.getElementById('btnReset'); 
            const presetBtns = document.querySelectorAll('.preset-btn');
            const inputSize = document.getElementById('inputSize');
            const selectUnit = document.getElementById('selectUnit');
            const checkHD = document.getElementById('checkHD');
            const btnGenerate = document.getElementById('btnGenerate');

            // Slider UI Elements
            const resultSliderContainer = document.getElementById('resultSliderContainer');
            const sliderImage = document.getElementById('sliderImage');
            const sliderSize = document.getElementById('sliderSize');
            const sliderDimensions = document.getElementById('sliderDimensions');
            const sliderFormat = document.getElementById('sliderFormat');
            const sliderCount = document.getElementById('sliderCount');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const btnDownloadSingle = document.getElementById('btnDownloadSingle');
            const btnDownloadZip = document.getElementById('btnDownloadZip');

            // Data State
            const MAX_IMAGES = 10;
            let imageBatch = []; 
            let activeImageId = null;
            let cropper = null;
            let isCropperActive = false;
            let currentSliderIndex = 0;
            let hasGenerated = false;

            // --- Theme Control ---
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlElement.classList.add('dark');
            }
            themeToggle.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                localStorage.setItem('theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
            });

            // --- Upload & Drop Logic ---
            uploadArea.addEventListener('click', () => imageInput.click());
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('border-accent'); });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('border-accent'));
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('border-accent');
                if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
            });
            imageInput.addEventListener('change', (e) => {
                if (e.target.files.length) handleFiles(e.target.files);
            });

            async function handleFiles(files) {
                // Smart Cleanup: Clear batch if starting fresh after a generation phase
                if (hasGenerated) {
                    btnReset.click();
                }

                let addedCount = 0;
                for (let file of files) {
                    if (imageBatch.length >= MAX_IMAGES) {
                        alert(`You have reached the limit of ${MAX_IMAGES} images.`);
                        break;
                    }
                    if (!file.type.startsWith('image/')) continue;
                    
                    const id = Date.now().toString() + Math.random().toString(36).substring(2);
                    
                    // Permanent Base64 Storage
                    const base64String = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    
                    imageBatch.push({
                        id,
                        fileName: file.name.split('.')[0],
                        originalBase64: base64String, // Base64 prevents App-switching memory wipes
                        croppedCanvas: null,
                        resultBase64: null,
                        resultSize: null,
                        resultDimensions: null,
                        resultFormat: null,
                        previewUrl: null, 
                        isLocked: false,
                        cropData: null,
                        canvasData: null,
                        targetWidth: '',
                        targetHeight: ''
                    });
                    addedCount++;
                }
                
                if (addedCount > 0) {
                    uploadArea.classList.add('hidden');
                    galleryContainer.classList.remove('hidden');
                    galleryContainer.classList.add('flex');
                    editorArea.classList.remove('hidden');
                    editorArea.classList.add('flex');
                    controlsContainer.classList.remove('opacity-40', 'grayscale', 'pointer-events-none');
                    
                    if (!activeImageId || !imageBatch.find(img => img.id === activeImageId)) {
                        setActiveImage(imageBatch[0].id);
                    }
                    renderGallery();
                }
                // Clear file input
                imageInput.value = "";
            }

            // --- Save Visual States between Toggles ---
            function saveActiveImageState() {
                if (!activeImageId) return;
                const img = imageBatch.find(i => i.id === activeImageId);
                if (!img) return;

                if (cropper && isCropperActive) {
                    img.cropData = cropper.getData();
                    img.canvasData = cropper.getCanvasData();
                }
                img.targetWidth = inputWidth.value;
                img.targetHeight = inputHeight.value;
            }

            // --- Dynamic Gallery Render ---
            function renderGallery() {
                galleryGrid.innerHTML = '';
                galleryCount.innerText = imageBatch.length;
                
                let targetUnlockedCount = imageBatch.filter(img => !img.isLocked && img.id !== activeImageId).length;

                imageBatch.forEach(img => {
                    const isSelected = img.id === activeImageId;
                    const isLocked = img.isLocked;
                    const card = document.createElement('div');
                    
                    let borderClasses = 'border-transparent';
                    if (isLocked) {
                        borderClasses = isSelected 
                            ? 'border-[#6495ED] shadow-[0_0_15px_#6495ED] scale-[1.02]' 
                            : 'border-[#6495ED] shadow-[0_0_8px_#6495ED]';
                    } else if (isSelected) {
                        borderClasses = 'border-accent shadow-lg shadow-accent/40 scale-[1.02]';
                    }
                    
                    card.className = `neu-inset rounded-[15px] p-2 flex flex-col relative transition-all duration-300 cursor-pointer border-2 ${borderClasses}`;
                    
                    const thumbUrl = img.croppedCanvas ? img.croppedCanvas.toDataURL('image/jpeg', 0.5) : img.originalBase64;
                    
                    const lockIconHTML = `
                        <button class="absolute -top-2 -left-2 w-7 h-7 neu-flat rounded-full flex items-center justify-center text-[11px] font-bold z-10 lock-btn transition-all duration-300 ${isLocked ? 'text-[#6495ED] shadow-[0_0_8px_#6495ED]' : 'text-gray-400 hover:text-[#6495ED] shadow-md'}" data-id="${img.id}" title="Toggle Lock">
                            <i class="fas ${isLocked ? 'fa-lock' : 'fa-unlock'}"></i>
                        </button>
                    `;

                    card.innerHTML = `
                        ${lockIconHTML}
                        <button class="absolute -top-2 -right-2 w-7 h-7 neu-flat rounded-full text-gray-500 hover:text-red-500 flex items-center justify-center text-[11px] font-bold z-10 delete-btn shadow-md transition-all duration-300" data-id="${img.id}">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="h-20 w-full mt-1.5 rounded-[10px] overflow-hidden bg-gray-200 dark:bg-gray-800 flex items-center justify-center select-img-btn" data-id="${img.id}">
                            <img src="${thumbUrl}" class="max-h-full max-w-full object-contain pointer-events-none">
                        </div>
                    `;
                    
                    galleryGrid.appendChild(card);
                });
                
                if (imageBatch.length < MAX_IMAGES) {
                    const addMoreBtn = document.createElement('div');
                    addMoreBtn.className = `neu-inset rounded-[15px] p-2 flex flex-col items-center justify-center min-h-[100px] cursor-pointer hover:border-accent border-2 border-dashed border-gray-400 dark:border-gray-600 transition-colors text-gray-400 hover:text-accent`;
                    addMoreBtn.innerHTML = `<i class="fas fa-plus text-2xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Add More</span>`;
                    addMoreBtn.onclick = () => imageInput.click();
                    galleryGrid.appendChild(addMoreBtn);
                }

                if (imageBatch.length > 1) {
                    btnApplyAll.classList.remove('hidden');
                    applyAllCount.innerText = `(Sync to all ${targetUnlockedCount} unlocked images)`;
                    
                    if (targetUnlockedCount === 0) {
                        btnApplyAll.classList.add('opacity-50', 'pointer-events-none');
                    } else {
                        btnApplyAll.classList.remove('opacity-50', 'pointer-events-none');
                    }
                } else {
                    btnApplyAll.classList.add('hidden');
                }
                
                document.querySelectorAll('.lock-btn').forEach(btn => {
                    btn.onclick = (e) => { e.stopPropagation(); toggleLock(btn.dataset.id); }
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = (e) => { e.stopPropagation(); removeImage(btn.dataset.id); }
                });
                document.querySelectorAll('.select-img-btn').forEach(btn => {
                    btn.onclick = () => { setActiveImage(btn.dataset.id); }
                });
            }

            // --- Toggle Lock Functionality ---
            function toggleLock(id) {
                const img = imageBatch.find(i => i.id === id);
                if (img) {
                    img.isLocked = !img.isLocked;
                    renderGallery();
                }
            }

            // --- Individual Delete Functionality ---
            function removeImage(id) {
                imageBatch = imageBatch.filter(img => img.id !== id);
                
                if (imageBatch.length === 0) {
                    btnReset.click();
                } else {
                    if (activeImageId === id) {
                        setActiveImage(imageBatch[0].id);
                    } else {
                        renderGallery();
                    }
                }
            }

            // --- Editor Workspace Synchronization ---
            function setActiveImage(id) {
                saveActiveImageState();

                const img = imageBatch.find(i => i.id === id);
                if (!img) return;
                activeImageId = id;
                
                inputWidth.value = img.targetWidth || '';
                inputHeight.value = img.targetHeight || '';
                
                if (cropper) {
                    cropper.destroy();
                    cropper = null;
                }
                isCropperActive = false;
                
                if (img.croppedCanvas) {
                    cropperWrapper.classList.add('hidden');
                    editorTools.classList.add('hidden');
                    applyButtonsContainer.classList.add('hidden');
                    staticPreviewWrapper.classList.remove('hidden');
                    staticPreviewImg.src = img.croppedCanvas.toDataURL('image/jpeg');
                } else {
                    imageWorkspace.src = img.originalBase64;
                    cropperWrapper.classList.remove('hidden');
                    staticPreviewWrapper.classList.add('hidden');
                    editorTools.classList.remove('hidden');
                    applyButtonsContainer.classList.remove('hidden');
                    
                    cropper = new Cropper(imageWorkspace, {
                        viewMode: 1,
                        dragMode: 'crop',
                        autoCropArea: 0.9,
                        responsive: true,
                        ready() {
                            if (img.canvasData) cropper.setCanvasData(img.canvasData);
                            if (img.cropData) cropper.setData(img.cropData);
                        },
                        crop(event) {
                            if(!document.activeElement.classList.contains('preset-btn')) {
                                inputWidth.value = Math.round(event.detail.width);
                                inputHeight.value = Math.round(event.detail.height);
                                
                                const actImg = imageBatch.find(i => i.id === activeImageId);
                                if (actImg) {
                                    actImg.targetWidth = inputWidth.value;
                                    actImg.targetHeight = inputHeight.value;
                                }
                            }
                        }
                    });
                    isCropperActive = true;
                }
                renderGallery(); 
            }

            // Editor Presets
            presetBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!cropper || !isCropperActive) return;
                    const ratio = parseFloat(btn.dataset.ratio);
                    cropper.setAspectRatio(isNaN(ratio) ? NaN : ratio);
                    if (btn.dataset.width && btn.dataset.height) {
                        inputWidth.value = btn.dataset.width;
                        inputHeight.value = btn.dataset.height;
                        
                        const actImg = imageBatch.find(i => i.id === activeImageId);
                        if (actImg) {
                            actImg.targetWidth = inputWidth.value;
                            actImg.targetHeight = inputHeight.value;
                        }
                    }
                });
            });

            // Input Sync Tracker
            const updateCropBox = () => {
                const w = parseInt(inputWidth.value);
                const h = parseInt(inputHeight.value);
                
                const actImg = imageBatch.find(i => i.id === activeImageId);
                if (actImg) {
                    actImg.targetWidth = inputWidth.value;
                    actImg.targetHeight = inputHeight.value;
                }

                if (!cropper || !isCropperActive) return;
                if (w > 0 && h > 0) cropper.setData({ width: w, height: h });
            };
            inputWidth.addEventListener('input', updateCropBox);
            inputHeight.addEventListener('input', updateCropBox);

            // Apply Crop to Active Image
            btnApplyCrop.addEventListener('click', () => {
                if (!cropper) return;
                const activeImg = imageBatch.find(img => img.id === activeImageId);
                if (activeImg) {
                    activeImg.croppedCanvas = cropper.getCroppedCanvas();
                    activeImg.isLocked = true; 
                    saveActiveImageState();
                    setActiveImage(activeImageId); 
                }
            });

            // Apply Crop to ALL Unlocked Images
            btnApplyAll.addEventListener('click', async () => {
                if (!cropper) return;
                
                btnApplyAll.classList.add('pointer-events-none', 'opacity-50');
                const originalHTML = btnApplyAll.innerHTML;
                btnApplyAll.innerHTML = `<i class="fas fa-spinner fa-spin text-lg mb-1"></i><span>PROCESSING...</span>`;

                const cropData = cropper.getData();
                const currentRatio = cropData.width / cropData.height;

                const activeImg = imageBatch.find(img => img.id === activeImageId);
                if (activeImg) {
                    activeImg.croppedCanvas = cropper.getCroppedCanvas();
                    activeImg.isLocked = true;
                    saveActiveImageState();
                }

                for (let img of imageBatch) {
                    if (img.id === activeImageId || img.isLocked) continue;
                    
                    await new Promise((resolve) => {
                        const tempImg = new Image();
                        tempImg.onload = () => {
                            const hiddenDiv = document.createElement('div');
                            hiddenDiv.style.display = 'none';
                            hiddenDiv.appendChild(tempImg);
                            document.body.appendChild(hiddenDiv);

                            const tempCropper = new Cropper(tempImg, {
                                viewMode: 1,
                                autoCropArea: 0.9,
                                aspectRatio: currentRatio,
                                ready() {
                                    img.croppedCanvas = tempCropper.getCroppedCanvas();
                                    img.isLocked = true;
                                    img.targetWidth = activeImg.targetWidth;
                                    img.targetHeight = activeImg.targetHeight;
                                    
                                    tempCropper.destroy();
                                    document.body.removeChild(hiddenDiv);
                                    resolve();
                                }
                            });
                        };
                        tempImg.src = img.originalBase64;
                    });
                }

                btnApplyAll.innerHTML = originalHTML;
                btnApplyAll.classList.remove('pointer-events-none', 'opacity-50');
                
                setActiveImage(activeImageId); 
            });

            // Edit Again functionality
            btnEditAgain.addEventListener('click', () => {
                const activeImg = imageBatch.find(img => img.id === activeImageId);
                if (activeImg) {
                    activeImg.croppedCanvas = null;
                    activeImg.isLocked = false;
                    saveActiveImageState();
                    setActiveImage(activeImageId); 
                }
            });

            // --- Reset All Logic ---
            btnReset.addEventListener('click', () => {
                imageBatch = [];
                activeImageId = null;
                hasGenerated = false;

                if (cropper) {
                    cropper.destroy();
                    cropper = null;
                }
                isCropperActive = false;

                inputWidth.value = '';
                inputHeight.value = '';
                inputSize.value = '';
                imageInput.value = '';
                checkHD.checked = false;
                document.querySelector('input[name="format"][value="jpg"]').checked = true;
                selectUnit.value = 'kb';

                imageWorkspace.src = '';
                staticPreviewImg.src = '';

                // Hide everything cleanly
                editorArea.classList.add('hidden');
                editorArea.classList.remove('flex');
                galleryContainer.classList.add('hidden');
                galleryContainer.classList.remove('flex');
                uploadArea.classList.remove('hidden');
                controlsContainer.classList.add('opacity-40', 'grayscale', 'pointer-events-none');
                
                // Hide Slider
                resultSliderContainer.classList.add('hidden');
                resultSliderContainer.classList.remove('flex');
                sliderImage.src = '';
            });

            // --- SEQUENTIAL BATCH GENERATION ---
            btnGenerate.addEventListener('click', async () => {
                if (imageBatch.length === 0) return;
                
                hasGenerated = true;
                btnGenerate.classList.add('pointer-events-none', 'opacity-80');
                
                for (let i = 0; i < imageBatch.length; i++) {
                    const imgObj = imageBatch[i];
                    
                    btnGenerate.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> PROCESSING ${i + 1}/${imageBatch.length}...`;
                    
                    await new Promise(resolve => setTimeout(resolve, 50)); 
                    
                    await processSingleImage(imgObj);
                }

                btnGenerate.innerHTML = `<i class="fas fa-bolt mr-2"></i> Generate Batch`;
                btnGenerate.classList.remove('pointer-events-none', 'opacity-80');

                // Logic Update: Show Slider & Scroll Down
                currentSliderIndex = 0;
                updateSliderView();
                
                // Smart Cleanup / Scroll into view
                setTimeout(() => {
                    resultSliderContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            });

            // --- Single Image Processing Engine ---
            async function processSingleImage(imgObj) {
                let sourceCanvas = imgObj.croppedCanvas;
                
                if (!sourceCanvas) {
                    sourceCanvas = document.createElement('canvas');
                    const img = new Image();
                    img.src = imgObj.originalBase64;
                    
                    await new Promise(resolve => {
                        img.onload = resolve;
                    });
                    
                    sourceCanvas.width = img.width;
                    sourceCanvas.height = img.height;
                    const c = sourceCanvas.getContext('2d');
                    c.drawImage(img, 0, 0);
                }
                
                const targetW = parseInt(imgObj.targetWidth || inputWidth.value);
                const targetH = parseInt(imgObj.targetHeight || inputHeight.value);
                let finalCanvas = document.createElement('canvas');
                finalCanvas.width = targetW || sourceCanvas.width;
                finalCanvas.height = targetH || sourceCanvas.height;
                const ctx = finalCanvas.getContext('2d');

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                if (checkHD.checked) {
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.filter = 'brightness(1.02) contrast(1.08) saturate(1.1)';
                } else {
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'medium';
                }

                ctx.drawImage(sourceCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

                const format = document.querySelector('input[name="format"]:checked').value;
                const targetSizeVal = parseFloat(inputSize.value);
                const targetUnit = selectUnit.value;
                
                let internalMime = format === 'webp' ? 'image/webp' : 'image/jpeg';
                let outputDataUrl;

                if (targetSizeVal && targetSizeVal > 0) {
                    const targetBytes = targetSizeVal * (targetUnit === 'mb' ? 1024 * 1024 : 1024);
                    let adjustedTarget = format === 'pdf' ? targetBytes - 2048 : targetBytes;
                    if(adjustedTarget < 1024) adjustedTarget = targetBytes; 

                    outputDataUrl = await smartCompress(finalCanvas, internalMime, adjustedTarget);
                } else {
                    outputDataUrl = finalCanvas.toDataURL(internalMime, 0.9);
                }

                imgObj.previewUrl = finalCanvas.toDataURL('image/jpeg', 0.85);
                imgObj.resultDimensions = `${finalCanvas.width} x ${finalCanvas.height} PX`;
                imgObj.resultFormat = format.toUpperCase();

                if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                        orientation: finalCanvas.width > finalCanvas.height ? 'l' : 'p',
                        unit: 'px',
                        format:[finalCanvas.width, finalCanvas.height]
                    });
                    
                    pdf.addImage(outputDataUrl, internalMime === 'image/webp' ? 'WEBP' : 'JPEG', 0, 0, finalCanvas.width, finalCanvas.height);
                    imgObj.resultBase64 = pdf.output('datauristring');
                    
                    const fileSize = getBase64Size(imgObj.resultBase64);
                    imgObj.resultSize = formatBytes(fileSize);
                } else {
                    imgObj.resultBase64 = outputDataUrl;
                    
                    const fileSize = getBase64Size(outputDataUrl);
                    imgObj.resultSize = formatBytes(fileSize);
                }
            }

            // Binary search to hit target file size
            async function smartCompress(canvas, mimeType, targetBytes) {
                let minQuality = 0.0;
                let maxQuality = 1.0;
                let bestDataUrl = canvas.toDataURL(mimeType, 1.0);
                
                for (let i = 0; i < 10; i++) {
                    let currentQuality = (minQuality + maxQuality) / 2;
                    let currentDataUrl = canvas.toDataURL(mimeType, currentQuality);
                    let currentBytes = Math.round((currentDataUrl.length * 3) / 4);
                    
                    if (currentBytes <= targetBytes) {
                        bestDataUrl = currentDataUrl;
                        minQuality = currentQuality; 
                    } else {
                        maxQuality = currentQuality; 
                    }
                }
                return bestDataUrl;
            }

            // Utilities
            function getBase64Size(base64String) {
                let padding = 0;
                if (base64String.endsWith('==')) padding = 2;
                else if (base64String.endsWith('=')) padding = 1;
                
                const base64Data = base64String.split(',')[1] || base64String;
                return (base64Data.length * 0.75) - padding;
            }

            function formatBytes(bytes, decimals = 2) {
                if (bytes === 0) return '0 KB';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            }

            // --- RESULT SLIDER LOGIC ---
            function updateSliderView() {
                if (imageBatch.length === 0) return;
                const imgObj = imageBatch[currentSliderIndex];
                
                sliderImage.src = imgObj.previewUrl;
                sliderSize.innerText = imgObj.resultSize;
                sliderDimensions.innerText = imgObj.resultDimensions;
                sliderFormat.innerText = imgObj.resultFormat;
                sliderCount.innerText = `IMAGE ${currentSliderIndex + 1} OF ${imageBatch.length}`;
                
                btnPrev.disabled = currentSliderIndex === 0;
                btnNext.disabled = currentSliderIndex === imageBatch.length - 1;
                
                resultSliderContainer.classList.remove('hidden');
                resultSliderContainer.classList.add('flex');
            }

            btnPrev.addEventListener('click', () => {
                if (currentSliderIndex > 0) {
                    currentSliderIndex--;
                    updateSliderView();
                }
            });

            btnNext.addEventListener('click', () => {
                if (currentSliderIndex < imageBatch.length - 1) {
                    currentSliderIndex++;
                    updateSliderView();
                }
            });

            // Single Download via Base64 Memory
            btnDownloadSingle.addEventListener('click', () => {
                const img = imageBatch[currentSliderIndex];
                if (!img || !img.resultBase64) return;
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = img.resultBase64;
                a.download = `${img.fileName}_processed.${img.resultFormat.toLowerCase()}`;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            // Master Download (ZIP) Integration
            btnDownloadZip.addEventListener('click', async () => {
                if (imageBatch.length === 0) return;
                
                const originalText = btnDownloadZip.innerHTML;
                btnDownloadZip.classList.add('pointer-events-none', 'opacity-80');
                btnDownloadZip.innerHTML = `<i class="fas fa-spinner fa-spin mr-2 text-xl"></i> ZIPPING...`;
                
                const zip = new JSZip();
                
                imageBatch.forEach((img, idx) => {
                    if (img.resultBase64) {
                        const fileName = `${img.fileName}_processed_${idx + 1}.${img.resultFormat.toLowerCase()}`;
                        // Extract purely the base64 string without data URI descriptor
                        const base64Data = img.resultBase64.split(',')[1];
                        zip.file(fileName, base64Data, {base64: true});
                    }
                });
                
                const zipBlob = await zip.generateAsync({type: "blob"});
                const url = window.URL.createObjectURL(zipBlob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'PowerResizer_Batch_Export.zip';
                
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                btnDownloadZip.innerHTML = originalText;
                btnDownloadZip.classList.remove('pointer-events-none', 'opacity-80');
            });

        });
    </script>
</body>
